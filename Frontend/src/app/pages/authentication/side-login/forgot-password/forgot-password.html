<h2 mat-dialog-title class="dialog-title">Forgot Password</h2>

<form [formGroup]="forgotForm" (ngSubmit)="submit()" class="forgot-form">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Employee Number</mat-label>
      <input matInput formControlName="empNo" />
    </mat-form-field>

    <p class="helper-text">
      A password reset request will be sent to your manager for approval.
    </p>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="dialog-actions">
    <button mat-button type="button" (click)="close()">Cancel</button>
    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="forgotForm.invalid"
    >
      Request Reset
    </button>
  </mat-dialog-actions>
</form>
