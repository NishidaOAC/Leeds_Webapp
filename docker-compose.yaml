services:
  test-api-gateway:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: test-api-gateway
    ports:
      - "3004:3000"
    env_file:
      - ./Backend/.env
    environment:
      AUTH_SERVICE_URL: http://test-auth-service:3001
      INVOICE_SERVICE_URL: http://test-invoice-service:3002
      FILE_SERVICE_URL: http://test-file-service:3003
      CUSTOMER_SERVICE_URL: http://test-customer-service:3004
      SUPPLIER_SERVICE_URL: http://test-supplier-service:3005
    depends_on:
      - test-auth-service
      - test-invoice-service
      - test-file-service
      - test-customer-service
      - test-supplier-service

  test-auth-service:
    build:
      # Adjusted context to point to the nested folder where package.json sits
      context: ./Backend/auth-service/auth-service
      dockerfile: Dockerfile
    container_name: test-auth-service
    ports:
      - "3005:3001"
    env_file:
      - ./Backend/auth-service/.env
    environment:
      DB_HOST: test-postgres-auth
      DB_PORT: 5432
    depends_on:
      - test-postgres-auth

  test-invoice-service:
    build:
      # Pointing to the nested folder if it matches the auth-service structure
      context: ./Backend/invoice-service/invoice-service
      dockerfile: Dockerfile
    container_name: test-invoice-service
    ports:
      - "3006:3002"
    env_file:
      - ./Backend/invoice-service/.env
    environment:
      DB_HOST: test-postgres-invoice
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://test-auth-service:3001
      FILE_SERVICE_URL: http://test-file-service:3003
    depends_on:
      - test-postgres-invoice

  test-file-service:
    build:
      context: ./Backend/file-service
      dockerfile: Dockerfile
    container_name: test-file-service
    ports:
      - "3007:3003"
    env_file:
      - ./Backend/file-service/.env
    environment:
      DB_HOST: test-postgres-file
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://test-auth-service:3001
      REDIS_HOST: test-redis
      RABBITMQ_HOST: test-rabbitmq
    depends_on:
      - test-postgres-file
      - test-rabbitmq
      - test-redis

  test-customer-service:
    build:
      context: ./Backend/customer-service
      dockerfile: Dockerfile
    container_name: test-customer-service
    ports:
      - "3008:3004"
    env_file:
      - ./Backend/customer-service/.env
    environment:
      DB_HOST: test-postgres-customer
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://test-auth-service:3001
      REDIS_HOST: test-redis
      RABBITMQ_HOST: test-rabbitmq
    depends_on:
      - test-postgres-customer
      - test-rabbitmq
      - test-redis

  test-supplier-service:
    build:
      context: ./Backend/supplier-service
      dockerfile: Dockerfile
    container_name: test-supplier-service
    ports:
      - "3009:3005"
    env_file:
      - ./Backend/supplier-service/.env
    environment:
      DB_HOST: test-postgres-supplier
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://test-auth-service:3001
      REDIS_HOST: test-redis
      RABBITMQ_HOST: test-rabbitmq
    depends_on:
      - test-postgres-supplier
      - test-rabbitmq
      - test-redis

  # --- Infrastructure (Remains the same) ---
  test-postgres-auth:
    image: postgres:15
    container_name: test-postgres-auth
    environment:
      POSTGRES_DB: leeds_payment_auth_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-auth:/var/lib/postgresql/data

  test-postgres-invoice:
    image: postgres:15
    container_name: test-postgres-invoice
    environment:
      POSTGRES_DB: leeds_payment_invoice_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-invoice:/var/lib/postgresql/data

  test-postgres-file:
    image: postgres:15
    container_name: test-postgres-file
    environment:
      POSTGRES_DB: leeds_payment_file_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-file:/var/lib/postgresql/data

  test-postgres-customer:
    image: postgres:15
    container_name: test-postgres-customer
    environment:
      POSTGRES_DB: leeds_payment_customer_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-customer:/var/lib/postgresql/data

  test-postgres-supplier:
    image: postgres:15
    container_name: test-postgres-supplier
    environment:
      POSTGRES_DB: leeds_payment_supplier_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-supplier:/var/lib/postgresql/data

  test-rabbitmq:
    image: rabbitmq:3-management
    container_name: test-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"

  test-redis:
    image: redis:7
    container_name: test-redis
    ports:
      - "6380:6379"

volumes:
  pgdata-auth:
  pgdata-invoice:
  pgdata-file:
  pgdata-customer:
  pgdata-supplier: