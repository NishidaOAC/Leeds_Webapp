services:
  api-gateway:
    build: ./Backend
    container_name: api-gateway
    ports:
      - "3000:3000"
    env_file:
      - ./Backend/.env
    environment:
      AUTH_SERVICE_URL: http://auth-service:3001
      INVOICE_SERVICE_URL: http://invoice-service:3002
      FILE_SERVICE_URL: http://file-service:3003
    depends_on:
      - auth-service
      - invoice-service
      - file-service

  auth-service:
    build: ./Backend/auth-service
    container_name: auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./Backend/auth-service/.env
    environment:
      DB_HOST: postgres-auth
      DB_PORT: 5432
    depends_on:
      - postgres-auth

  invoice-service:
    build: ./Backend/invoice-service
    container_name: invoice-service
    ports:
      - "3002:3002"
    env_file:
      - ./Backend/invoice-service/.env
    environment:
      DB_HOST: postgres-invoice
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://auth-service:3001
      FILE_SERVICE_URL: http://file-service:3003
    depends_on:
      - postgres-invoice

  file-service:                      # ✅ MOVED INSIDE services
    build: ./Backend/file-service
    container_name: file-service
    ports:
      - "3003:3003"
    env_file:
      - ./Backend/file-service/.env
    environment:
      DB_HOST: postgres-file
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://auth-service:3001
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - postgres-file
      - rabbitmq
      - redis

  postgres-auth:
    image: postgres:15
    environment:
      POSTGRES_DB: leeds_payment_auth_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-auth:/var/lib/postgresql/data

  postgres-invoice:
    image: postgres:15
    environment:
      POSTGRES_DB: leeds_payment_invoice_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-invoice:/var/lib/postgresql/data

  postgres-file:
    image: postgres:15
    environment:
      POSTGRES_DB: leeds_payment_file_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-file:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata-auth:
  pgdata-invoice:
  pgdata-file:
