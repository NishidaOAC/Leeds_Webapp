services:
  fileapi-gateway:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: fileapi-gateway
    ports:
      - "3004:3000"
    env_file:
      - ./Backend/.env
    environment:
      AUTH_SERVICE_URL: http://fileauth-service:3001
      INVOICE_SERVICE_URL: http://fileinvoice-service:3002
      FILE_SERVICE_URL: http://filefile-service:3003
      CUSTOMER_SERVICE_URL: http://filecustomer-service:3004
      SUPPLIER_SERVICE_URL: http://filesupplier-service:3005
    depends_on:
      - fileauth-service
      - fileinvoice-service
      - filefile-service
      - filecustomer-service
      - filesupplier-service

  fileauth-service:
    build:
      context: ./Backend
      dockerfile: auth-service/Dockerfile
    container_name: fileauth-service
    ports:
      - "3005:3001"
    env_file:
      - ./Backend/auth-service/.env
    environment:
      DB_HOST: filepostgres-auth
      DB_PORT: 5432
    depends_on:
      - filepostgres-auth

  fileinvoice-service:
    build:
      context: ./Backend
      dockerfile: invoice-service/Dockerfile
    container_name: fileinvoice-service
    ports:
      - "3006:3002"
    env_file:
      - ./Backend/invoice-service/.env
    environment:
      DB_HOST: filepostgres-invoice
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://fileauth-service:3001
      FILE_SERVICE_URL: http://filefile-service:3003
    depends_on:
      - filepostgres-invoice

  filefile-service:
    build:
      context: ./Backend
      dockerfile: file-service/Dockerfile
    container_name: filefile-service
    ports:
      - "3007:3003"
    env_file:
      - ./Backend/file-service/.env
    environment:
      DB_HOST: filepostgres-file
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://fileauth-service:3001
      REDIS_HOST: fileredis
      RABBITMQ_HOST: filerabbitmq
    depends_on:
      - filepostgres-file
      - filerabbitmq
      - fileredis

  filecustomer-service:
    build:
      context: ./Backend
      dockerfile: customer-service/Dockerfile
    container_name: filecustomer-service
    ports:
      - "3008:3004"
    env_file:
      - ./Backend/customer-service/.env
    environment:
      DB_HOST: filepostgres-customer
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://fileauth-service:3001
      REDIS_HOST: fileredis
      RABBITMQ_HOST: filerabbitmq
    depends_on:
      - filepostgres-customer
      - filerabbitmq
      - fileredis

  filesupplier-service:
    build:
      context: ./Backend
      dockerfile: supplier-service/Dockerfile
    container_name: filesupplier-service
    ports:
      - "3009:3005"
    env_file:
      - ./Backend/supplier-service/.env
    environment:
      DB_HOST: filepostgres-supplier
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://fileauth-service:3001
      REDIS_HOST: fileredis
      RABBITMQ_HOST: filerabbitmq
    depends_on:
      - filepostgres-supplier
      - filerabbitmq
      - fileredis

  # --- Infrastructure Section (RESTORED) ---
  filepostgres-auth:
    image: postgres:15
    container_name: filepostgres-auth
    environment:
      POSTGRES_DB: leeds_payment_auth_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-auth:/var/lib/postgresql/data

  filepostgres-invoice:
    image: postgres:15
    container_name: filepostgres-invoice
    environment:
      POSTGRES_DB: leeds_payment_invoice_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-invoice:/var/lib/postgresql/data

  filepostgres-file:
    image: postgres:15
    container_name: filepostgres-file
    environment:
      POSTGRES_DB: leeds_payment_file_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-file:/var/lib/postgresql/data

  filepostgres-customer:
    image: postgres:15
    container_name: filepostgres-customer
    environment:
      POSTGRES_DB: leeds_payment_customer_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-customer:/var/lib/postgresql/data

  filepostgres-supplier:
    image: postgres:15
    container_name: filepostgres-supplier
    environment:
      POSTGRES_DB: leeds_payment_supplier_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-supplier:/var/lib/postgresql/data

  filerabbitmq:
    image: rabbitmq:3-management
    container_name: filerabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"

  fileredis:
    image: redis:7
    container_name: fileredis
    ports:
      - "6380:6379"

volumes:
  pgdata-auth:
  pgdata-invoice:
  pgdata-file:
  pgdata-customer:
  pgdata-supplier: