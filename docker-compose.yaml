services:
  api-gateway:
    build: ./Backend
    container_name: api-gateway
    ports:
      - "3004:3000"
    env_file:
      - ./Backend/.env
    environment:
      AUTH_SERVICE_URL: http://auth-service:3001
      INVOICE_SERVICE_URL: http://invoice-service:3002
      FILE_SERVICE_URL: http://file-service:3003
      CUSTOMER_SERVICE_URL: http://customer-service:3004
      SUPPLIER_SERVICE_URL: http://supplier-service:3005
    depends_on:
      - auth-service
      - invoice-service
      - file-service
      - customer-service
      - supplier-service

  auth-service:
    build: ./Backend/auth-service
    container_name: auth-service
    ports:
      - "3005:3001"
    env_file:
      - ./Backend/auth-service/.env
    environment:
      DB_HOST: postgres-auth
      DB_PORT: 5432
    depends_on:
      - postgres-auth

  invoice-service:
    build: ./Backend/invoice-service
    container_name: invoice-service
    ports:
      - "3006:3002"
    env_file:
      - ./Backend/invoice-service/.env
    environment:
      DB_HOST: postgres-invoice
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://auth-service:3001
      FILE_SERVICE_URL: http://file-service:3003
    depends_on:
      - postgres-invoice

  file-service:
    build: ./Backend/file-service
    container_name: file-service
    ports:
      - "3007:3003"
    env_file:
      - ./Backend/file-service/.env
    environment:
      DB_HOST: postgres-file
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://auth-service:3001
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - postgres-file
      - rabbitmq
      - redis

  customer-service:
    build: ./Backend/customer-service
    container_name: customer-service
    ports:
      - "3008:3004"
    env_file:
      - ./Backend/customer-service/.env
    environment:
      DB_HOST: postgres-customer
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://auth-service:3001
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - postgres-customer
      - rabbitmq
      - redis

  supplier-service:
    build: ./Backend/supplier-service
    container_name: supplier-service
    ports:
      - "3009:3005"
    env_file:
      - ./Backend/supplier-service/.env
    environment:
      DB_HOST: postgres-supplier
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://auth-service:3001
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - postgres-supplier
      - rabbitmq
      - redis

  # --- Databases ---
  postgres-auth:
    image: postgres:15
    container_name: postgres-auth
    environment:
      POSTGRES_DB: leeds_payment_auth_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-auth:/var/lib/postgresql/data

  postgres-invoice:
    image: postgres:15
    container_name: postgres-invoice
    environment:
      POSTGRES_DB: leeds_payment_invoice_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-invoice:/var/lib/postgresql/data

  postgres-file:
    image: postgres:15
    container_name: postgres-file
    environment:
      POSTGRES_DB: leeds_payment_file_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-file:/var/lib/postgresql/data

  postgres-customer:
    image: postgres:15
    container_name: postgres-customer
    environment:
      POSTGRES_DB: leeds_payment_customer_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-customer:/var/lib/postgresql/data

  postgres-supplier:
    image: postgres:15
    container_name: postgres-supplier
    environment:
      POSTGRES_DB: leeds_payment_supplier_db
      POSTGRES_USER: oac_softwares
      POSTGRES_PASSWORD: AWTGBVHYTUOKJK25690
    volumes:
      - pgdata-supplier:/var/lib/postgresql/data

  # --- Infrastructure ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6380:6379"

volumes:
  pgdata-auth:
  pgdata-invoice:
  pgdata-file:
  pgdata-customer:
  pgdata-supplier: